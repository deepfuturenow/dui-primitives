<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DUI — Unstyled Web Component Library</title>
  <meta name="description" content="Unstyled web components + composable themes. Components provide structure and behavior; themes provide aesthetics. Built with Lit." />
  <meta property="og:title" content="DUI — Unstyled Web Component Library" />
  <meta property="og:description" content="Unstyled web components + composable themes built with Lit." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f8f8fa" media="(prefers-color-scheme: light)" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <script type="module" src="./index.js"></script>
  <script type="module" src="./inspector.js"></script>
  <style>
    :root {
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
    }
    /* Prevent FOUC — hide until the app shell is defined */
    body:not(:has(docs-app:defined)) {
      opacity: 0;
    }
    body {
      margin: 0;
      background-color: var(--background);
      color: var(--foreground);
      font-family: var(--font-sans);
      min-height: 100vh;
      transition: opacity 0.15s ease;
    }
  </style>
</head>
<body>
  <docs-app></docs-app>
</body>
</html>
